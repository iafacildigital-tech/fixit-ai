<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FixIT AI</title>

  <!-- 📱 RESPONSIVE -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔐 PROTEGER ACCESO (si no hay usuario, vuelve al login) -->

  <script>
    const usuario = localStorage.getItem("usuario");

    if (!usuario) {
      window.location.href = "/login.html";
    }
  </script>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
      background: #0f172a;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00f0ff;
    }

    textarea, input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    textarea {
      background: black;
      color: white;
    }

    .enviar {
      background: #00f0ff;
      font-weight: bold;
    }

    .logout {
      background: red;
      font-weight: bold;
    }

    .dashboard {
      background: #22c55e;
      font-weight: bold;
    }

    #chat {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg {
      padding: 10px;
      border-radius: 10px;
      margin: 5px 0;
      font-size: 14px;
    }

    .user {
      background: #1e293b;
      text-align: right;
    }

    .bot {
      background: #020617;
      border: 1px solid #00f0ff;
    }

    @media (max-width: 600px) {
      h2 {
        font-size: 18px;
      }

      .msg {
        font-size: 13px;
      }
    }
  </style>

</head>

<body>

  <div class="container">

```
<h2>🤖 FixIT AI</h2>

<!-- 🔴 BOTÓN LOGOUT -->
<button class="logout" onclick="logout()">Cerrar sesión</button>

<!-- 🟢 BOTÓN DASHBOARD (SOLO ADMIN) -->
<button id="btnDashboard" class="dashboard" style="display:none;">
  📊 Ver Dashboard
</button>

<!-- 💬 CHAT -->
<div id="chat"></div>

<!-- ✍️ INPUT PROBLEMA -->
<textarea id="problema" placeholder="Describe tu problema..."></textarea>

<!-- 📷 SUBIR IMAGEN -->
<input type="file" id="imagen">

<!-- 🚀 ENVIAR -->
<button class="enviar" onclick="enviar()">Enviar</button>
```

  </div>

  <script>

    // ===============================
    // 🔐 CONTROL DE ROL (ADMIN)
    // ===============================
    const rol = localStorage.getItem("rol");

    // Si es admin, mostrar botón dashboard
    if (rol === "admin") {
      const btn = document.getElementById("btnDashboard");

      btn.style.display = "block";

      btn.onclick = () => {
        window.location.href = "/historial.html";
      };
    }

    // ===============================
    // 🔓 LOGOUT
    // ===============================
    function logout() {
      localStorage.clear();
      window.location.href = "/login.html";
    }

    // ===============================
    // 💬 MOSTRAR MENSAJES EN CHAT
    // ===============================
    function agregarMensaje(texto, tipo) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.className = "msg " + tipo;
      div.innerHTML = texto;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ===============================
    // 🚀 ENVIAR PROBLEMA AL BACKEND
    // ===============================
    async function enviar() {
      try {
        const problema = document.getElementById("problema").value;
        const img = document.getElementById("imagen").files[0];

        // Validación
        if (!problema && !img) {
          alert("Escribe algo o sube una imagen");
          return;
        }

        // Mostrar mensaje del usuario
        agregarMensaje(problema || "📷 Imagen enviada", "user");

        // Preparar datos
        const fd = new FormData();
        fd.append("problema", problema);
        if (img) fd.append("imagen", img);

        const empresa = localStorage.getItem("empresa") || "demo";

        // Enviar al backend
        const res = await fetch("/analizar", {
          method: "POST",
          headers: {
            "empresa": empresa
          },
          body: fd
        });

        const data = await res.json();

        // Mostrar respuesta IA
        const mensaje = `
🔍 Problema: ${data.problema || "N/A"}<br>
🧠 Tipo: ${data.tipo || "N/A"}<br>
🛠️ Solución:<br>${(data.solucion || "Sin solución disponible").toString().replace(/\n/g,"<br>")}
`;

        agregarMensaje(mensaje, "bot");

      } catch (error) {
        console.error("❌ Error:", error);
        alert("Error conectando con el servidor");
      }
    }

  </script>

</body>
</html>
