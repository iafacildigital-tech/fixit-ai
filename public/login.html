<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login FixIT AI</title>

  <style>
    body {
      background: #050b1c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      background: #0c162c;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffc3;
      width: 300px;
      text-align: center;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00ffc3;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00cfa3;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>🔐 Login FixIT AI</h2>

    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
  </div>

  <script>
    async function login() {

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Completa los campos");
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          // Guardar empresa
          localStorage.setItem("empresa", data.empresa);

          // Redirigir
          window.location.href = "index.html";
        } else {
          alert("❌ Usuario o contraseña incorrectos");
        }

      } catch (error) {
        console.error("Error:", error);
        alert("Error conectando con el servidor");
      }
    }
  </script>

</body>
</html>
