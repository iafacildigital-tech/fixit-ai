<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>FixIT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔐 PROTEGER LOGIN -->

<script>
  const usuario = localStorage.getItem("usuario");
  if (!usuario) {
    window.location.href = "/login.html";
  }
</script>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #021124, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* CONTENEDOR APP */
.app {
  width: 320px;
  height: 600px;
  background: linear-gradient(180deg, #031c3b, #020617);
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 0 40px rgba(0,150,255,0.4);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* BOTONES ARRIBA */
.top {
  display: flex;
  justify-content: space-between;
}

.btn {
  padding: 5px 10px;
  border-radius: 10px;
  border: none;
  font-size: 12px;
  cursor: pointer;
}

.logout {
  background: #111827;
  color: #00c3ff;
  border: 1px solid #00c3ff;
}

.dashboard {
  background: linear-gradient(90deg, #00c3ff, #007bff);
  color: white;
}

/* ESFERA */
.ai {
  width: 100px;
  height: 100px;
  margin: 10px auto;
  border-radius: 50%;
  background: radial-gradient(circle, #00c3ff, #003366);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: bold;
  box-shadow: 0 0 30px #00c3ff;
}

/* TEXTO */
.text {
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}

/* INPUT */
textarea {
  width: 100%;
  height: 60px;
  border-radius: 20px;
  border: 2px solid #00c3ff;
  background: transparent;
  color: white;
  padding: 10px;
  outline: none;
  resize: none;
  text-align: center;
}

/* BOTÓN ENVIAR */
.send {
  margin-top: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(90deg, #00c3ff, #007bff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* RESPUESTA */
.resp {
  font-size: 13px;
  max-height: 180px;
  overflow-y: auto;
}
</style>

</head>

<body>

<div class="app">

  <!-- BOTONES -->

  <div class="top">
    <button class="btn logout" onclick="logout()">Salir</button>
    <button id="dash" class="btn dashboard" style="display:none;">Dashboard</button>
  </div>

  <!-- IA -->

  <div>
    <div class="ai">AI</div>
    <div class="text">Ask anything to FixIT AI</div>
  </div>

  <!-- INPUT -->

  <div>
    <textarea id="problema" placeholder="Your problem..."></textarea>
    <button class="send" onclick="enviar()">Enviar</button>
  </div>

  <!-- RESPUESTA -->

  <div id="respuesta" class="resp"></div>

</div>

<script>

// ADMIN
const rol = localStorage.getItem("rol");

if (rol === "admin") {
  const d = document.getElementById("dash");
  d.style.display = "block";
  d.onclick = () => window.location.href = "/historial.html";
}

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}

// IA
async function enviar() {

  const problema = document.getElementById("problema").value;

  if (!problema) return;

  const fd = new FormData();
  fd.append("problema", problema);

  const res = await fetch("/analizar", {
    method: "POST",
    headers: {
      "empresa": localStorage.getItem("empresa")
    },
    body: fd
  });

  const data = await res.json();

  document.getElementById("respuesta").innerHTML = `
🔍 ${data.problema}<br><br>
🧠 ${data.tipo}<br><br>
🛠️ ${data.solucion}
`;
}

</script>

</body>
</html>
