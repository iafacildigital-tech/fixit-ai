<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>FixIT AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0a0f2c, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Arial;
  color: white;
}

/* CONTENEDOR */
.container {
  text-align: center;
}

/* "ROBOT" SIMULADO */
.ai {
  width: 150px;
  height: 150px;
  margin: auto;
  border-radius: 50%;
  background: radial-gradient(circle, #8b5cf6, #1e1b4b);
  box-shadow: 0 0 40px #8b5cf6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 20px #8b5cf6; }
  50% { transform: scale(1.1); box-shadow: 0 0 50px #a78bfa; }
  100% { transform: scale(1); box-shadow: 0 0 20px #8b5cf6; }
}

/* TEXTO */
h1 {
  margin-top: 20px;
}

p {
  opacity: 0.7;
}

/* BOTONES */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(90deg, #8b5cf6, #6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* BOTÓN SECUNDARIO */
.secondary {
  background: transparent;
  border: 1px solid #8b5cf6;
}
</style>

</head>

<body>

<div class="container">

  <div class="ai">🤖</div>

  <h1>FixIT AI</h1>

  <p>Smart IT Support Assistant</p>

<button onclick="entrar()">Get Started</button>

  <br>

<button class="secondary" onclick="entrar()">Continue</button>

</div>

<script>
function entrar() {
  window.location.href = "/index.html";
}
</script>

</body>
</html>
