<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FixIT AI</title>

  <script>
    // 🔐 PROTEGER ACCESO
    const usuario = localStorage.getItem("usuario");

    if (!usuario) {
      window.location.href = "/login.html";
    }
  </script>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 400px;
      margin-top: 50px;
      background: #0f172a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px #00f0ff;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      background: black;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .enviar {
      background: #00f0ff;
    }

    .logout {
      background: red;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .user {
      background: #1e293b;
    }

    .bot {
      background: #020617;
      border: 1px solid #00f0ff;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>🤖 FixIT AI</h2>

    <button class="logout" onclick="logout()">Cerrar sesión</button>

    <div id="chat"></div>

    <textarea id="problema" placeholder="Describe tu problema..."></textarea>

    <input type="file" id="imagen">

    <button class="enviar" onclick="enviar()">Enviar</button>

  </div>

  <script>
    function logout() {
      localStorage.clear();
      window.location.href = "/login.html";
    }

    function agregarMensaje(texto, tipo) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.className = "msg " + tipo;
      div.innerHTML = texto;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function enviar() {
      const problema = document.getElementById("problema").value;
      const img = document.getElementById("imagen").files[0];

      if (!problema && !img) return;

      agregarMensaje(problema || "📷 Imagen enviada", "user");

      const fd = new FormData();
      fd.append("problema", problema);
      if (img) fd.append("imagen", img);

      const empresa = localStorage.getItem("empresa") || "demo";

      const res = await fetch("/analizar", {
        method: "POST",
        headers: {
          "empresa": empresa
        },
        body: fd
      });

      const data = await res.json();

      const mensaje = `
🔍 Problema: ${data.problema}<br>
🧠 Tipo: ${data.tipo}<br>
🛠️ Solución:<br>${data.solucion.replace(/\n/g,"<br>")}
`;

      agregarMensaje(mensaje, "bot");
    }
  </script>

</body>
</html>
