<!DOCTYPE html>
<html lang="es">

<!-- 🔐 PROTEGER ACCESO (si no hay sesión, redirige al login) -->
<script>
  const usuario = localStorage.getItem("usuario");

  if (!usuario) {
    window.location.href = "/login.html";
  }
</script>

<head>
  <meta charset="UTF-8">

  <!-- 📱 RESPONSIVE PARA CELULAR -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FixIT AI Dashboard</title>

  <!-- 📊 LIBRERÍA DE GRÁFICAS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    /* 🎨 ESTILO GENERAL */
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    /* 📦 CONTENEDOR PRINCIPAL */
    .container {
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    /* 🔘 BOTONES */
    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .volver {
      background: #00f0ff;
    }

    /* 📊 CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* 📈 GRÁFICA */
    #grafica-container {
      width: 100%;
      height: 300px;
      margin: 20px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    /* 📋 TABLA */
    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 10px;
      border: 1px solid #333;
    }

    th {
      background: #0ea5e9;
    }

    tr:hover {
      background: #334155;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 768px) {
      .card {
        width: 90%;
      }

      #grafica-container {
        height: 250px;
      }

      table {
        font-size: 12px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>📊 FixIT AI Dashboard</h1>

  <!-- 🔙 BOTÓN VOLVER -->
  <button class="volver" onclick="window.location.href='/index.html'">
    ⬅️ Volver
  </button>

  <!-- 📊 CARDS DE RESUMEN -->
  <div class="cards">

    <div class="card">
      <h3>📌 Total Tickets</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>🔥 Problema Top</h3>
      <p id="top">N/A</p>
    </div>

  </div>

  <!-- 📈 GRÁFICA -->
  <div id="grafica-container">
    <canvas id="grafica"></canvas>
  </div>

  <!-- 📋 TABLA -->
  <table>
    <thead>
      <tr>
        <th>Problema</th>
        <th>Solución</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

</div>

<script>

let chart = null;

// 🚀 FUNCIÓN PRINCIPAL
async function cargarHistorial() {

  // 🏢 Obtener empresa desde sesión
  const empresa = localStorage.getItem("empresa") || "demo";

  // 📡 Llamar backend con empresa
  const res = await fetch("/historial", {
    headers: {
      "empresa": empresa
    }
  });

  const data = await res.json();

  const tabla = document.getElementById("tabla");

  tabla.innerHTML = "";

  let contador = {}; // 🧠 Para contar problemas

  // 🔄 Recorrer historial
  data.forEach(item => {

    // 📊 Contar problemas
    contador[item.problema] = (contador[item.problema] || 0) + 1;

    // 🧾 Pintar tabla
    tabla.innerHTML += `
      <tr>
        <td>${item.problema}</td>
        <td>${item.solucion}</td>
        <td>${
          item.fecha ? new Date(item.fecha).toLocaleString() : "Sin fecha"
        }</td>
      </tr>
    `;
  });

  // ===== 📊 ESTADÍSTICAS =====

  let total = data.length;
  let top = "N/A";

  if (total > 0) {
    top = Object.keys(contador).reduce((a, b) =>
      contador[a] > contador[b] ? a : b
    );
  }

  document.getElementById("total").innerText = total;
  document.getElementById("top").innerText = top;

  // ===== 📈 GRÁFICA =====

  const labels = Object.keys(contador);
  const valores = Object.values(contador);

  const ctx = document.getElementById('grafica').getContext('2d');

  // 🔄 destruir gráfica anterior
  if (chart) chart.destroy();

  // 📊 crear nueva gráfica
  if (labels.length > 0) {
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Cantidad de problemas',
          data: valores
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });
  }
}

// 🚀 Ejecutar al cargar
cargarHistorial();

</script>

</body>
</html>
